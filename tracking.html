<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Post Handheld Device</title>
    <style>
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: #222; 
            color: #fff;
            margin: 0; 
            padding: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }
        
        /* Das Gehäuse des Handscanners */
        .device-container { 
            background: #111; 
            width: 100%;
            max-width: 412px;
            height: 100%;
            display: flex;
            flex-direction: column;
            border: 4px solid #333;
            box-sizing: border-box;
        }

        /* ECHTE STATUS BAR (Wie beim Post-Scanner) */
        .status-bar {
            background: #000;
            padding: 8px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            font-weight: bold;
            border-bottom: 2px solid #ffcc00;
            color: #ffcc00;
        }

        .status-left { display: flex; gap: 10px; align-items: center; }
        .status-right { display: flex; gap: 12px; align-items: center; }
        
        /* Hauptinhalt */
        .content {
            padding: 20px;
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: #1e1e1e;
        }

        .logo { font-size: 50px; margin-bottom: 5px; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        h2 { margin: 0 0 5px 0; color: #fff; font-size: 20px; letter-spacing: 1px; }
        .app-subtitle { color: #888; font-size: 12px; margin-bottom: 25px; text-transform: uppercase; }
        
        input { 
            width: 100%; 
            padding: 16px; 
            box-sizing: border-box; 
            border: 2px solid #444; 
            border-radius: 8px; 
            font-size: 18px; 
            margin-bottom: 15px; 
            background: #2b2b2b;
            color: #fff;
            text-align: center;
            outline: none;
        }
        input:focus { border-color: #ffcc00; }
        
        button { 
            width: 100%; 
            background: #ffcc00; 
            color: #000; 
            border: none; 
            padding: 16px; 
            border-radius: 8px; 
            font-size: 18px; 
            font-weight: bold; 
            cursor: pointer; 
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        button:active { transform: scale(0.98); }

        /* Ergebnis-Box */
        .result-box { 
            margin-top: 25px; 
            padding: 20px; 
            border-radius: 8px; 
            display: none; 
            background: #2b2b2b; 
            border-left: 6px solid #ffcc00; 
            text-align: left; 
            width: 100%;
            box-sizing: border-box;
        }
        .result-box p { margin: 8px 0; font-size: 16px; }
    </style>
</head>
<body>

<div class="device-container">
    <!-- HIER STECKEN DIE ECHTEN DATEN DRINNEN -->
    <div class="status-bar">
        <div class="status-left">
            <span>📯 Post Mobile OS</span>
            <span id="network-type">[WLAN]</span>
        </div>
        <div class="status-right">
            <span id="signal-status">Verbunden</span>
            <span id="battery-status">Akku: --%</span>
        </div>
    </div>
    
    <div class="content">
        <div class="logo">📯</div>
        <h2>DELIVERY TRACKING</h2>
        <div class="app-subtitle">Handheld Terminal v4.1</div>
        
        <input type="text" id="searchInput" placeholder="SENDUNGSNUMMER SCANNEN">
        <button onclick="trackPaket()">Sendung Suchen</button>

        <div class="result-box" id="resultBox">
            <p><strong>STATUS:</strong> <span id="statusOutput" style="color: #ffcc00;">-</span></p>
            <p style="font-size: 13px; color: #aaa;">LOG-ZEIT: <span id="timeOutput">-</span></p>
        </div>
    </div>
</div>

<script>
    const DB_URL = "https://flow-post-default-rtdb.europe-west1.firebasedatabase.app/pakete";

    // 1. ECHTE AKKUDATEN VOM IPHONE AUSLESEN
    if (navigator.getBattery) {
        navigator.getBattery().then(function(battery) {
            function updateBattery() {
                const level = Math.round(battery.level * 100);
                document.getElementById('battery-status').innerText = `Akku: ${level}%`;
            }
            updateBattery();
            battery.addEventListener('levelchange', updateBattery);
        });
    } else {
        document.getElementById('battery-status').innerText = "Akku: OK";
    }

    // 2. ECHTE NETZWERK-VERBINDUNG PRÜFEN
    function updateNetworkStatus() {
        const signal = document.getElementById('signal-status');
        const netType = document.getElementById('network-type');
        
        if (navigator.onLine) {
            signal.innerText = "Online";
            signal.style.color = "#00ff00";
            
            // Versuchen, den Verbindungstyp (WLAN vs Mobilfunk) zu erraten
            if (navigator.connection) {
                const type = navigator.connection.type || navigator.connection.effectiveType;
                netType.innerText = `[${type.toUpperCase()}]`;
            } else {
                netType.innerText = "[WLAN/NET]";
            }
        } else {
            signal.innerText = "OFFLINE";
            signal.style.color = "#ff0000";
            netType.innerText = "[KEIN NETZ]";
        }
    }
    
    window.addEventListener('online', updateNetworkStatus);
    window.addEventListener('offline', updateNetworkStatus);
    updateNetworkStatus();

    // 3. DATENBANK ABFRAGE
    async function trackPaket() {
        const searchNr = document.getElementById('searchInput').value.trim();
        const resultBox = document.getElementById('resultBox');

        if (searchNr === "") return;
        
        try {
            const response = await fetch(`${DB_URL}/${searchNr}.json`);
            const data = await response.json();

            if (data) {
                document.getElementById('statusOutput').innerText = data.status;
                document.getElementById('timeOutput').innerText = data.zeit;
                resultBox.style.display = "block";
            } else {
                document.getElementById('statusOutput').innerText = "NUMMER UNBEKANNT!";
                document.getElementById('timeOutput').innerText = "N/A";
                resultBox.style.display = "block";
            }
        } catch (e) {
            document.getElementById('statusOutput').innerText = "FEHLER BEIM ABRUF!";
            resultBox.style.display = "block";
        }
    }
</script>

</body>
</html>

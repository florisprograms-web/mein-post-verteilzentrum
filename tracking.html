<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Post M-Device V5</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background: #121212; color: #fff; margin: 0; padding: 0; }
        .scanner-device { max-width: 412px; margin: 0 auto; height: 100vh; display: flex; flex-direction: column; background: #1a1a1a; }
        .status-bar { background: #000; padding: 10px 15px; display: flex; justify-content: space-between; font-size: 12px; color: #ffcc00; font-weight: bold; border-bottom: 2px solid #ffcc00; }
        .main-ui { padding: 20px; flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: flex-start; }
        
        .laser-btn { background: #ff3333; color: white; width: 80px; height: 80px; border-radius: 50%; border: 4px solid #fff; font-weight: bold; font-size: 14px; cursor: pointer; box-shadow: 0 0 15px rgba(255,51,51,0.6); margin-bottom: 20px; }
        .laser-btn:active { background: #cc0000; }
        
        input { width: 100%; padding: 15px; background: #262626; border: 2px solid #444; border-radius: 6px; color: #ffcc00; font-size: 18px; text-align: center; margin-bottom: 15px; box-sizing: border-box; }
        .action-btn { width: 100%; background: #ffcc00; color: #000; font-weight: bold; padding: 15px; font-size: 16px; border: none; border-radius: 6px; text-transform: uppercase; }
        
        #camera-view { width: 100%; max-width: 300px; background: #000; border-radius: 8px; overflow: hidden; margin-bottom: 15px; display: none; }
        .result-panel { margin-top: 20px; background: #262626; padding: 15px; border-radius: 6px; width: 100%; box-sizing: border-box; border-left: 5px solid #ffcc00; display: none; }
    </style>
</head>
<body>

<div class="scanner-device">
    <div class="status-bar">
        <span>📯 SYSTEM-V5 ONLINE</span>
        <span id="iphone-battery">BATTERY: --%</span>
    </div>
    
    <div class="main-ui">
        <p style="color: #888; font-size: 11px; text-transform: uppercase; margin-bottom: 10px;">Hardware Laser Emulator</p>
        <button class="laser-btn" onclick="startCamScanner()">SCAN</button>
        
        <div id="camera-view"></div>

        <input type="text" id="phoneSearchInput" placeholder="NUMMER HIER REIN">
        <button class="action-btn" onclick="searchPackage()">ABFRAGEN</button>

        <div class="result-panel" id="phoneResult">
            <p style="margin: 0 0 5px 0; font-size: 12px; color: #888;">LOG-STATUS:</p>
            <div id="phoneStatusOutput" style="font-size: 20px; font-weight: bold; color: #ffcc00;">-</div>
            <p id="phoneTimeOutput" style="margin: 10px 0 0 0; font-size: 11px; color: #666;"></p>
        </div>
    </div>
</div>

<script>
    // Akku-Anzeige
    if (navigator.getBattery) {
        navigator.getBattery().then(b => {
            const up = () => document.getElementById('iphone-battery').innerText = `BATTERY: ${Math.round(b.level * 100)}%`;
            up(); b.addEventListener('levelchange', up);
        });
    }

    // Kamera-Scanner Logik
    let html5QrcodeScanner;
    function startCamScanner() {
        const camView = document.getElementById('camera-view');
        camView.style.display = "block";
        
        html5QrcodeScanner = new Html5Qrcode("camera-view");
        html5QrcodeScanner.start(
            { facingMode: "environment" }, 
            { fps: 10, qrbox: { width: 250, height: 150 } },
            (decodedText) => {
                document.getElementById('phoneSearchInput').value = decodedText;
                html5QrcodeScanner.stop();
                camView.style.display = "none";
                searchPackage(); // Direkt nach Scan suchen
            },
            (errorMessage) => { /* Kontinuierlicher Scan */ }
        ).catch(err => alert("Kamera-Fehler: " + err));
    }

    // Lokaler Sync-Trick über dieselbe Domain
    function searchPackage() {
        const nr = document.getElementById('phoneSearchInput').value.trim();
        const panel = document.getElementById('phoneResult');
        const pakete = JSON.parse(localStorage.getItem('post_db_v5')) || {};

        if (pakete[nr]) {
            document.getElementById('phoneStatusOutput').innerText = pakete[nr].status;
            document.getElementById('phoneTimeOutput').innerText = "SYSTEM-TIME: " + pakete[nr].zeit;
        } else {
            document.getElementById('phoneStatusOutput').innerText = "NOT FOUND / UNBEKANNT";
            document.getElementById('phoneTimeOutput').innerText = "";
        }
        panel.style.display = "block";
    }
</script>
</body>
</html>
